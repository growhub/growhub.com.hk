    <radialGradient id="hglow1" cx="0.2" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
