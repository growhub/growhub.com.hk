    <radialGradient id="hglow2" cx="0.85" cy="0.85" r="0.7">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="800" rx="28" fill="url(#hbg)"/>
  <rect width="1000" height="800" rx="28" fill="url(#hglow1)"/>
  <rect width="1000" height="800" rx="28" fill="url(#hglow2)"/>

