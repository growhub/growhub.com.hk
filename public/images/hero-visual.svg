    <rect x="588" y="458" width="140" height="16" rx="8" fill="url(#hacc)"/>
    <rect x="588" y="494" width="264" height="70" rx="10" fill="#eef2ff"/>
    <polyline points="600,548 630,520 662,534 694,500 726,514 758,486 792,504 824,470"
